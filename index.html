<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1A5C38;--green-mid:#2E7D52;--green-light:#E8F5EE;--green-pale:#F2FAF5;
  --red:#E24B4A;--red-light:#FCEBEB;
  --text:#1a1a1a;--muted:#6b7280;--border:#e5e7eb;--bg:#F7F8F7;--white:#fff;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem}
.container{max-width:700px;margin:0 auto}

.header{background:var(--green);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.header h1{color:#fff;font-size:16px;font-weight:600;line-height:1.3}
.header p{color:#A8D5BC;font-size:12px;margin-top:3px}
.score-box{text-align:right;flex-shrink:0}
.score-box .pts{color:#fff;font-size:28px;font-weight:600;line-height:1;font-family:'DM Mono',monospace}
.score-box .lbl{color:#A8D5BC;font-size:11px;margin-top:2px}

.progress-wrap{margin-bottom:1rem}
.progress-info{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-info span{font-size:12px;color:var(--muted)}
.progress-bar{height:5px;background:#d1d5db;border-radius:3px;overflow:hidden}

.qcard{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qcard-head{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.qnum{background:var(--green-light);color:var(--green);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.qtext{font-size:15px;font-weight:500;line-height:1.6;color:var(--text);margin-bottom:1rem}

.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--white)}
.opt:hover:not(.locked){background:var(--green-pale);border-color:#a7d3b8}
.opt.selected{border-color:var(--green);background:var(--green-light)}
.opt.correct{border-color:var(--green);background:var(--green-light)}
.opt.wrong{border-color:var(--red);background:var(--red-light)}
.opt-letter{width:24px;height:24px;min-width:24px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);margin-top:1px;transition:all .15s}
.opt.selected .opt-letter,.opt.correct .opt-letter{background:var(--green);color:#fff}
.opt.wrong .opt-letter{background:var(--red);color:#fff}
.opt-text{font-size:13.5px;color:var(--text);line-height:1.5}

.expl{margin-top:.875rem;padding:.75rem 1rem;background:var(--green-light);border-left:4px solid var(--green);border-radius:0 8px 8px 0;font-size:13px;color:#1A5C38;line-height:1.6}
.expl strong{font-weight:600}

.nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:.5rem}
.btn{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text);transition:all .15s}
.btn:hover{background:#f3f4f6}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn.primary:hover{background:var(--green-mid)}
.btn:disabled{opacity:.35;cursor:default}
.qcount{font-size:13px;color:var(--muted);font-weight:500}

.result-card{display:none;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:2rem 1.5rem;text-align:center}
.result-pct{font-size:52px;font-weight:700;color:var(--green);line-height:1;font-family:'DM Mono',monospace}
.result-msg{font-size:15px;color:var(--muted);margin:.5rem 0 1.5rem}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.rstat{background:#f9fafb;border-radius:10px;padding:1rem}
.rstat .rv{font-size:24px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.rstat .rl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}
.rstat.ok .rv{color:var(--green)}.rstat.ko .rv{color:var(--red)}

.breakdown{margin-bottom:1.5rem;text-align:left}
.breakdown h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.75rem}
.th-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.th-name{font-size:12px;color:var(--text);width:180px;flex-shrink:0}
.th-bar-wrap{flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.th-bar{height:100%;border-radius:4px;transition:width .5s ease}
.th-score{font-size:12px;font-weight:600;color:var(--muted);width:36px;text-align:right;flex-shrink:0}

@media(max-width:480px){
  .header{flex-direction:column;align-items:flex-start}
  .result-grid{grid-template-columns:repeat(2,1fr)}
  .th-name{width:120px;font-size:11px}
}
</style>

<script>
const Q=[
{t:"Réglementation transport",q:"Le retrait par le préfet de région de l'autorisation d'exercer la profession de transporteur peut être contesté par l'entreprise devant le tribunal :",o:["De commerce","Judiciaire","Administratif","De police"],a:2,e:"Le retrait d'une autorisation administrative relève de la juridiction <strong>administrative</strong>. Le tribunal administratif est compétent pour contester les décisions des autorités de l'État."},
{t:"Transport national",q:"La forclusion en transport signifie :",o:["Le renversement de la charge de la preuve","La mise en place de l'expertise judiciaire","L'extinction irrémédiable de toute action en réparation","Le délai de prescription pour toute action en réparation"],a:2,e:"La forclusion est l'<strong>extinction définitive et irrémédiable</strong> du droit d'agir en justice, faute d'avoir respecté les délais ou formalités imposés par la loi."},
{t:"Transport national",q:"En transport national, en l'absence de convention écrite, le transporteur peut :",o:["Limiter unilatéralement sa responsabilité","Signifier que les marchandises sont transportées aux risques du donneur d'ordre","Se référer aux limites d'indemnités des contrats types","Se retrancher derrière les limites du contrat type location"],a:2,e:"En l'absence de convention écrite, les <strong>contrats types s'appliquent de plein droit</strong>. Le transporteur peut donc se référer aux limites d'indemnité prévues par ces contrats types."},
{t:"Droit des affaires",q:"Dans une société commerciale, le montant des dividendes distribués aux associés est fixé par :",o:["L'assemblée générale des associés","Les dirigeants de la société","Le commissaire aux comptes","L'expert-comptable"],a:0,e:"La distribution de dividendes est une décision souveraine de l'<strong>assemblée générale ordinaire</strong> des associés ou actionnaires. Ni les dirigeants ni les commissaires aux comptes ne peuvent la décider."},
{t:"Réglementation transport",q:"Suite à un contrôle, une infraction pour défaut de visite technique est relevée. La responsabilité pénale incombe :",o:["Au conducteur salarié","Au représentant légal de l'entreprise, propriétaire du véhicule","Au donneur d'ordre","À un responsable salarié non délégataire"],a:1,e:"Le <strong>représentant légal de l'entreprise</strong> est responsable pénalement du respect des obligations d'entretien et de contrôle technique des véhicules de son entreprise."},
{t:"Contrats de transport",q:"Il y a contrat de transport juridiquement formé quand :",o:["Les parties sont d'accord sur la nature et le prix de la prestation","Les parties se sont obligatoirement entendues par acte écrit","La marchandise est livrée","Le document de suivi a été renseigné par le remettant"],a:0,e:"Le contrat de transport est un contrat <strong>consensuel</strong> : il est formé dès l'accord des parties sur la nature et le prix de la prestation, même verbalement. L'écrit n'est pas exigé pour sa validité."},
{t:"Droit des affaires",q:"Dans une SARLU (SARL Unipersonnelle), hors faute de gestion, le gérant est responsable :",o:["De la totalité des dettes sociales","Des dettes sociales sur ses biens personnels","Des dettes sociales à concurrence de ses apports","Des dettes sociales à concurrence de son chiffre d'affaires"],a:2,e:"La SARLU est une SARL à associé unique : la responsabilité est <strong>limitée aux apports</strong>. L'associé gérant ne répond pas des dettes sociales sur son patrimoine personnel, hors faute de gestion."},
{t:"Droit des affaires",q:"Un fonds de commerce ne peut pas inclure :",o:["La marque commerciale","Le local dans lequel s'exerce le commerce","Les stocks de matières consommables","Le matériel et mobilier de bureau"],a:2,e:"Le fonds de commerce comprend des éléments incorporels (clientèle, enseigne, marque, droit au bail) et corporels (matériel, mobilier). Les <strong>stocks de matières consommables</strong> sont des actifs circulants distincts du fonds de commerce."},
{t:"Droit des affaires",q:"Dans une SARL, l'approbation des comptes annuels est effectuée par :",o:["L'assemblée générale ordinaire","L'assemblée générale extraordinaire","Le commissaire aux comptes","L'expert-comptable"],a:0,e:"L'approbation des comptes annuels relève de l'<strong>assemblée générale ordinaire (AGO)</strong>. L'AGE est réservée aux décisions extraordinaires (modification des statuts, augmentation de capital…)."},
{t:"Droit des affaires",q:"La cessation de paiement d'une société commerciale est :",o:["L'impossibilité de faire face au passif exigible avec son actif disponible","La perte de la moitié de son capital social","Une infraction imputable aux dirigeants","La tenue d'une comptabilité irrégulière"],a:0,e:"La cessation de paiement = <strong>impossibilité de faire face au passif exigible avec l'actif disponible</strong> (art. L631-1 Code de commerce). C'est la condition d'ouverture du redressement judiciaire."},
{t:"Droit des affaires",q:"En principe, le délai de la prescription en matière commerciale est de :",o:["1 an","5 ans","10 ans","30 ans"],a:1,e:"Depuis la loi du 17 juin 2008, la prescription de droit commun en matière commerciale est de <strong>5 ans</strong> (art. L110-4 Code de commerce)."},
{t:"Droit des affaires",q:"L'émission d'un chèque sans provision pour la première fois entraîne envers le tireur :",o:["Une injonction de la banque à ne plus émettre de chèque pendant un an","Une injonction de la banque à régulariser sous 30 jours","Une sanction pénale","La restitution de toutes les formules de chèque"],a:1,e:"Lors d'un premier incident de paiement par chèque, la banque adresse une injonction au titulaire de <strong>régulariser sa situation sous 30 jours</strong> (payer le chèque ou provisionner le compte)."},
{t:"Transport national",q:"En transport routier intérieur, le délai pour intenter une action récursoire :",o:["Est d'un mois à dater de la livraison","Est d'un mois à dater de l'action principale","S'ajoute au délai de prescription","Annule le délai de prescription"],a:1,e:"L'action récursoire doit être intentée dans <strong>un mois à compter du jour où le défendeur a été actionné en justice</strong> (art. L133-6 al. 3 Code de commerce)."},
{t:"Gestion financière",q:"L'amortissement d'un bien correspond :",o:["Au montant des annuités de l'emprunt ayant permis de l'acquérir","À sa perte de valeur sous l'effet du temps et de son utilisation","À la rémunération minimale attendue de cet investissement","À un décaissement de trésorerie sur plusieurs exercices"],a:1,e:"L'amortissement traduit la <strong>dépréciation irréversible</strong> d'un bien due à l'usure, au temps ou à l'obsolescence. C'est une charge calculée, non un décaissement réel."},
{t:"Gestion financière",q:"La dépréciation d'un stock se constate par l'enregistrement :",o:["D'une provision","D'un amortissement","D'une perte exceptionnelle","D'une moins-value"],a:0,e:"La dépréciation d'un stock (perte de valeur réversible) se constate par une <strong>provision pour dépréciation de stocks</strong> (compte 39 du PCG). L'amortissement concerne les immobilisations."},
{t:"Réglementation transport",q:"Le respect de la condition de capacité financière est fonction du :",o:["Fonds de roulement de l'entreprise","Montant des capitaux propres de l'entreprise","Montant des capitaux permanents","Chiffre d'affaires du dernier exercice"],a:1,e:"La capacité financière est appréciée sur la base des <strong>capitaux propres</strong> de l'entreprise (fonds propres figurant au bilan), selon les seuils fixés par le règlement européen 1071/2009."},
{t:"RSE / Temps de conduite",q:"Lors d'une traversée à bord d'un ferry, le conducteur routier est autorisé à interrompre son repos journalier :",o:["1 fois 15 minutes","2 fois 15 minutes","2 fois sans dépasser une heure au total","1 fois 1 heure"],a:2,e:"Selon l'art. 9 du règlement 561/2006, lors d'un transport en ferry ou en train, le repos journalier normal peut être interrompu <strong>au maximum 2 fois, pour une durée totale ne dépassant pas 1 heure</strong>."},
{t:"Droit social",q:"La durée quotidienne du temps de service du personnel roulant ne peut excéder :",o:["12 heures","11 heures","10 heures","9 heures"],a:0,e:"Selon la réglementation sociale applicable au transport routier, la durée quotidienne du <strong>temps de service est limitée à 12 heures</strong> (décret du 26 janvier 1983 et accords de branche)."},
{t:"Réglementation transport",q:"Au regard de sa durée et de sa périodicité, la FCO (formation continue obligatoire) des conducteurs routiers est de 35h :",o:["Tous les 6 mois","Tous les 5 ans","Par an","Tous les 3 ans à partir de 60 ans"],a:1,e:"La FCO est une formation de <strong>35 heures tous les 5 ans</strong>, obligatoire pour maintenir la qualification initiale obtenue par la FIMO."},
{t:"Droit social",q:"Le protocole d'accord sur le travail de nuit concerne :",o:["L'ensemble du personnel","Seulement les conducteurs","Seulement le personnel sédentaire","L'ensemble du personnel sauf les cadres"],a:3,e:"Le protocole d'accord sur le travail de nuit dans les transports routiers s'applique à <strong>l'ensemble du personnel</strong> (sauf les cadres dirigeants qui relèvent d'un régime particulier). Réponse officielle : D."},
{t:"Droit social",q:"Un contrat de travail à durée déterminée est requalifié en CDI lorsque :",o:["Le contrat ne précise pas de période d'essai","Le motif pour lequel il est conclu n'est pas indiqué","Le contrat est rompu avant le terme","Il est conclu pour remplacer un salarié absent"],a:1,e:"L'absence de mention du <strong>motif de recours au CDD</strong> dans le contrat est une cause obligatoire de requalification en CDI (art. L1242-12 Code du travail)."},
{t:"Droit social",q:"La garantie minimale de rémunération de l'amplitude mensuelle (GMA) peut s'appliquer aux :",o:["Personnels caristes","Personnels sédentaires","Conducteurs grands routiers ou longues distances","Conducteurs courtes distances"],a:2,e:"La GMA (Garantie Minimale d'Amplitude) est une disposition conventionnelle spécifique aux <strong>conducteurs grands routiers et longues distances</strong>, en compensation des contraintes liées à l'éloignement."},
{t:"Droit social",q:"La visite médicale d'information et de prévention (hors postes à risques) doit être pratiquée :",o:["Avant la prise effective du poste","Avant la fin de la période d'essai","Après la fin de la période d'essai","Dans les trois mois à compter de la prise effective du poste"],a:3,e:"Depuis la loi Travail 2017, la visite d'information et de prévention (VIP) doit avoir lieu <strong>dans les 3 mois suivant la prise de poste</strong> (art. R4624-10 Code du travail)."},
{t:"RSE / Temps de conduite",q:"Selon le règlement (CE) n° 561/2006, la durée minimale du repos hebdomadaire réduit est de :",o:["36 heures","45 heures","24 heures","20 heures"],a:2,e:"Selon l'art. 8§6 du règlement 561/2006, le repos hebdomadaire peut être réduit à <strong>24 heures consécutives minimum</strong>, sous réserve de compensation avant la fin de la 3ème semaine suivante."},
{t:"Droit social",q:"La période d'essai d'un conducteur en cas d'absence maladie :",o:["N'a pas d'incidence pour apprécier les aptitudes","Est un motif de rupture du contrat","Est rémunérée sans délai de carence","Doit être prolongée de la même durée que l'absence"],a:3,e:"En cas d'absence maladie pendant la période d'essai, celle-ci est <strong>prolongée d'une durée égale à la durée de l'absence</strong>, afin de permettre à l'employeur d'apprécier les aptitudes du salarié."},
{t:"Droit social",q:"L'ouverture d'un droit à congés payés de 2,5 jours ouvrables a lieu dès que le salarié a travaillé :",o:["10 jours de travail effectif","3 semaines de travail effectif","1 mois de travail effectif","2 mois de travail effectif"],a:2,e:"Les congés payés s'acquièrent à raison de <strong>2,5 jours ouvrables par mois de travail effectif</strong> chez le même employeur (art. L3141-3 Code du travail). Il faut donc 1 mois complet pour ouvrir ce droit."},
{t:"RSE / Temps de conduite",q:"Selon le règlement (CE) n° 561/2006, la durée maximale de conduite sur deux semaines consécutives est de :",o:["70 heures","80 heures","85 heures","90 heures"],a:3,e:"Selon l'art. 6§3 du règlement 561/2006, la durée de conduite totale accumulée sur <strong>deux semaines consécutives ne doit pas dépasser 90 heures</strong>."},
{t:"RSE / Temps de conduite",q:"Le respect de la RSE au regard des temps de conduite :",o:["Concerne uniquement les conducteurs","Concerne uniquement les gestionnaires de transport","Concerne tous les acteurs de la chaîne transport","Concerne uniquement les donneurs d'ordre"],a:0,e:"La RSE s'impose en premier lieu aux <strong>conducteurs</strong> qui sont directement soumis aux règles de temps de conduite et de repos. Réponse officielle : A."},
{t:"Droit social",q:"Devant le conseil de prud'hommes, le délai de prescription pour toute action portant sur l'exécution du contrat de travail est de :",o:["7 ans","5 ans","3 ans","2 ans"],a:2,e:"Depuis la loi du 14 juin 2013, la prescription des actions portant sur <strong>l'exécution du contrat de travail est de 3 ans</strong> (art. L1471-1 Code du travail). Les actions en paiement de salaire se prescrivent par 3 ans."},
{t:"Réglementation transport",q:"Constitue un délit le fait de conduire un véhicule soumis au règlement UE 165/2014 :",o:["Sans attestation de conducteur","Sans carte de conducteur","Au-delà de la durée de conduite journalière autorisée","En période d'interdiction de circuler"],a:1,e:"Conduire sans <strong>carte de conducteur</strong> (tachygraphe numérique) un véhicule soumis au règlement 165/2014 constitue un délit (art. L3315-5 Code des transports), passible d'amendes et d'emprisonnement."},
{t:"Contrats de transport",q:"Le délai de transport tel que prévu par le contrat type dit 'général' est de :",o:["1 jour pour 400 km","1 jour pour 450 km","2 jours pour 500 km","3 jours pour 500 km"],a:1,e:"Selon le contrat type général, le délai de transport est d'<strong>1 jour pour 450 km</strong> (avec un minimum d'1 jour). Ce délai s'apprécie hors jours non ouvrables."},
{t:"Réglementation transport",q:"Pour satisfaire à l'exigence d'établissement, l'entreprise doit disposer :",o:["D'un établissement réceptionné par une CCI","De locaux référencés dans une nomenclature tenue par une CCI","De locaux référencés dans une nomenclature tenue par une chambre des métiers","D'un établissement référencé dans la nomenclature d'activités françaises (code APE)"],a:3,e:"L'exigence d'établissement (règlement 1071/2009) nécessite des locaux stables et permanents, référencés dans la <strong>nomenclature d'activités françaises (code APE/NAF)</strong>, attestant d'une présence réelle sur le territoire."},
{t:"Transport international (CMR)",q:"Dans le cadre d'un transport routier international, en cas de retard, le transporteur devra payer :",o:["8,33 DTS par kilo","Une indemnité qui ne peut pas dépasser le prix du transport","Une indemnité qui ne peut pas dépasser la moitié du prix du transport","Une indemnité calculée sur la valeur de la marchandise"],a:1,e:"Selon l'<strong>art. 23§5 CMR</strong>, l'indemnité pour retard ne peut pas dépasser <strong>le prix du transport</strong>. Elle ne peut donner lieu à des dommages et intérêts supérieurs à ce montant."},
{t:"Transport international",q:"La location transfrontalière de véhicule avec conducteur :",o:["N'est pas autorisée","Est autorisée uniquement en France","Est autorisée dans l'Union européenne","Est autorisée dans les États parties à l'accord sur l'Espace économique européen"],a:3,e:"La location transfrontalière de véhicule avec conducteur est autorisée dans les <strong>États membres de l'Espace économique européen (EEE)</strong>, conformément au règlement 1072/2009 et aux accords bilatéraux."},
{t:"Contrats de transport",q:"Au sens de la loi, les prestations autres que la conduite et la préparation aux opérations de chargement/déchargement, sont des prestations :",o:["Accessoires","Annexes","Secondaires","Auxiliaires"],a:1,e:"Le Code des transports (art. L3221-1 et s.) distingue le transport lui-même des <strong>prestations annexes</strong> (manutention, emballage, entreposage…) qui ne font pas partie du contrat de transport stricto sensu."},
{t:"Contrats de transport",q:"La preuve d'un contrat de transport en national peut être apportée par :",o:["La déclaration en douane","La licence de transport intérieur","La licence communautaire","La lettre de voiture"],a:3,e:"La <strong>lettre de voiture</strong> est le document probatoire du contrat de transport national. Elle matérialise la prise en charge de la marchandise par le transporteur et fait preuve du contrat."},
{t:"Gestion financière",q:"La loi prévoit qu'à défaut de stipulations contractuelles identifiant les charges de carburant, celles-ci sont déterminées par référence au prix du gazole publié par le :",o:["Code des transports","Journal officiel","Bulletin officiel du ministère des transports","Comité national routier"],a:3,e:"En l'absence de clause contractuelle, le prix du carburant de référence est celui publié par le <strong>Comité National Routier (CNR)</strong>, qui établit mensuellement les indices de coût du transport routier."},
{t:"Transport international (CMR)",q:"Lors d'un transport international régi par la CMR, le retard à la livraison ne peut donner lieu à indemnité que si une réserve a été adressée par écrit dans le délai maximum de :",o:["21 jours à dater de la livraison","30 jours à dater de la livraison","60 jours à dater de l'enlèvement","Un an à dater de la livraison"],a:0,e:"Selon l'<strong>art. 30§3 CMR</strong>, en cas de retard, le destinataire doit adresser ses réserves écrites au transporteur dans un délai de <strong>21 jours à compter de la mise à disposition de la marchandise</strong>."},
{t:"Responsabilité",q:"L'article L.3222-6 du code des transports prévoit que toute prestation annexe non prévue par le contrat qui cause un dommage engage la responsabilité :",o:["De l'entreprise de transport","Du commissionnaire de transport","Du transitaire","De l'entreprise bénéficiaire de la prestation"],a:3,e:"Selon l'<strong>art. L3222-6 Code des transports</strong>, les prestations annexes non prévues au contrat engagent la responsabilité de <strong>l'entreprise qui en bénéficie</strong>, et non du transporteur qui les exécute."},
{t:"Transport international",q:"Le cabotage routier est :",o:["Interdit par la réglementation européenne","Autorisé sous respect de règles spécifiques","Totalement libre dans l'Union européenne","Autorisé aux seuls transporteurs nationaux"],a:1,e:"Le cabotage (transport intérieur effectué par un transporteur étranger) est <strong>autorisé sous conditions strictes</strong> : 3 opérations maximum en 7 jours après un transport international entrant (règlement 1072/2009)."},
{t:"Gestion financière",q:"Légalement, un prix de transport doit couvrir :",o:["Au moins les charges fixes et variables de l'entreprise","Uniquement le flux de liquidités","Uniquement les charges relatives au renouvellement des véhicules","Uniquement la retraite du chef d'entreprise"],a:0,e:"Le prix de transport doit permettre à l'entreprise de couvrir au minimum ses <strong>charges fixes et variables</strong> (carburant, péages, salaires, amortissements…). C'est une obligation légale liée à l'interdiction de la vente à perte."},
{t:"Réglementation transport",q:"Combien de carte(s) de tachygraphe un conducteur peut-il détenir au maximum ?",o:["4","3","2","1"],a:3,e:"Un conducteur ne peut détenir qu'<strong>une seule carte de conducteur</strong> valide à la fois (règlement 165/2014, art. 26). La détention de plusieurs cartes est interdite et constitue une infraction."},
{t:"Sécurité / Véhicules",q:"La longueur totale d'un train double peut être portée à :",o:["18 m","19,25 m","18,75 m","20,35 m"],a:2,e:"La longueur maximale d'un train double (véhicule tracteur + remorque) est de <strong>18,75 m</strong> (art. R312-5 Code de la route). Pour les ensembles articulés, la limite est également 18,75 m."},
{t:"Sécurité / Véhicules",q:"La masse maximale autorisée d'un ensemble routier comportant 4 essieux ne doit pas dépasser :",o:["32 tonnes","35 tonnes","38 tonnes","40 tonnes"],a:2,e:"Selon le Code de la route, la masse maximale autorisée (MMA) d'un ensemble à <strong>4 essieux est de 38 tonnes</strong> (art. R312-4). Pour 5 essieux : 40 t, pour 6 essieux : 44 t."},
{t:"Sécurité / Véhicules",q:"Le code de la route prévoit une mesure d'immobilisation du véhicule lorsque le dépassement de la masse autorisée est supérieur à :",o:["1 %","5 %","10 %","15 %"],a:1,e:"L'immobilisation du véhicule est prononcée lorsque la surcharge dépasse <strong>5 % de la masse autorisée</strong> (art. R325-3 Code de la route). En deçà, seule une contravention est dressée."},
{t:"Sécurité / Véhicules",q:"Un extincteur doit être vérifié tous les :",o:["6 mois","12 mois","24 mois","36 mois"],a:1,e:"Les extincteurs portatifs doivent faire l'objet d'une <strong>vérification annuelle (tous les 12 mois)</strong> par un technicien compétent, conformément à la réglementation incendie (arrêté du 18 juin 1980)."},
{t:"Marchandises dangereuses",q:"Lors d'un transport de marchandises dangereuses, les consignes écrites devant se trouver à bord sont délivrées au conducteur par :",o:["Le conseiller à la sécurité du destinataire","L'expéditeur","L'employeur","Le fabricant"],a:1,e:"Selon l'<strong>ADR (section 5.4.3)</strong>, les consignes écrites de sécurité (fiches de consignes) sont fournies au conducteur par <strong>l'expéditeur</strong>, avant le départ, dans les langues comprises par le conducteur."},
{t:"Transport international (CMR)",q:"En transport routier international, en cas de perte partielle, avarie ou retard, l'action en justice est prescrite :",o:["1 an après le jour de la livraison","1 an après la prise en charge par le transporteur","3 ans après le jour de la livraison","3 ans après la prise en charge par le transporteur"],a:0,e:"Selon l'<strong>art. 32 CMR</strong>, les actions auxquelles peut donner lieu un transport soumis à la CMR sont prescrites dans le délai d'<strong>1 an à partir du jour de la livraison</strong> (ou du jour où la livraison aurait dû avoir lieu)."},
{t:"Transport international (CMR)",q:"La CMR s'applique pour un transport international :",o:["Même si les deux pays ne sont pas signataires","Lorsqu'au moins l'un des deux pays est signataire de la CMR","Aux transports funéraires","Aux transports de déménagement"],a:1,e:"La CMR s'applique dès lors qu'<strong>au moins l'un des deux pays</strong> (expédition ou destination) est partie à la convention, quel que soit le pays de résidence des parties (art. 1 CMR)."},
{t:"Transport international",q:"Le certificat d'agrément douanier dans le cadre du régime TIR est valable :",o:["1 an","2 ans","3 ans","4 ans"],a:2,e:"Le certificat d'agrément douanier TIR est délivré pour une durée de <strong>2 ans renouvelable</strong>. Réponse officielle du corrigé 2024 : C (certaines sources indiquent 2 ans, le corrigé retient C)."}
];

const ANSWERS=[2,2,2,0,1,0,2,2,0,0,1,1,1,1,0,1,2,0,1,3,1,2,3,2,3,2,3,0,2,1,1,3,1,3,1,3,3,0,3,1,0,3,2,2,1,1,1,0,1,2];

let cur=0,ans=new Array(50).fill(-1),locked=new Array(50).fill(false);

function render(){
  const q=Q[cur];
  const pct=Math.round((cur+1)/50*100);
  document.getElementById("pfill").style.width=pct+"%";
  document.getElementById("qtop").textContent="Question "+(cur+1)+" sur 50";
  document.getElementById("answered").textContent=locked.filter(Boolean).length+" répondues";
  document.getElementById("qcount").textContent=(cur+1)+" / 50";
  document.getElementById("bprev").disabled=cur===0;
  const nb=document.getElementById("bnext");
  if(cur===49&&locked[cur]){nb.textContent="Voir les résultats";nb.onclick=showResult;}
  else{nb.textContent="Suivant →";nb.onclick=()=>go(1);}
  nb.disabled=!locked[cur]&&ans[cur]===-1;

  const L=["a","b","c","d"];
  let h=`<div class="qcard"><div class="qcard-head"><span class="qnum">Q${cur+1}</span></div><div class="qtext">${q.q}</div><div class="options">`;
  q.o.forEach((o,i)=>{
    let c="opt";
    if(locked[cur]){
      c+=" locked";
      if(i===ANSWERS[cur])c+=" correct";
      else if(i===ans[cur]&&ans[cur]!==ANSWERS[cur])c+=" wrong";
    }else if(i===ans[cur])c+=" selected";
    h+=`<div class="${c}" onclick="pick(${i})"><div class="opt-letter">${L[i]}</div><div class="opt-text">${o}</div></div>`;
  });
  h+=`</div>`;
  if(locked[cur])h+=`<div class="expl">${q.e}</div>`;
  h+=`</div>`;
  document.getElementById("qzone").innerHTML=h;
  updateScore();
}

function pick(i){
  if(locked[cur])return;
  ans[cur]=i;locked[cur]=true;render();
  const nb=document.getElementById("bnext");nb.disabled=false;
  if(cur===49){nb.textContent="Voir les résultats";nb.onclick=showResult;}
}
function go(d){if(cur+d<0||cur+d>=50)return;cur+=d;render();}
function updateScore(){
  let ok=0;for(let i=0;i<50;i++)if(locked[i]&&ans[i]===ANSWERS[i])ok++;
  document.getElementById("score").textContent=ok*2;
}

function showResult(){
  let ok=0;for(let i=0;i<50;i++)if(ans[i]===ANSWERS[i])ok++;
  const ko=50-ok,pts=ok*2,pct=Math.round(ok/50*100);
  const themes=[...new Set(Q.map(q=>q.t))];
  let tStats={};
  themes.forEach(t=>{tStats[t]={ok:0,total:0}});
  Q.forEach((q,i)=>{tStats[q.t].total++;if(ans[i]===ANSWERS[i])tStats[q.t].ok++;});
  let bHTML=themes.map(t=>{
    const s=tStats[t],p2=Math.round(s.ok/s.total*100);
    const c=p2>=70?"#1A5C38":p2>=50?"#F0B429":"#E24B4A";
    return `<div class="th-row"><div class="th-name">${t}</div><div class="th-bar-wrap"><div class="th-bar" style="width:${p2}%;background:${c}"></div></div><div class="th-score">${s.ok}/${s.total}</div></div>`;
  }).join("");
  const msg=pts>=60?"Bonne préparation, continue !":pts>=40?"Des points à consolider.":"À retravailler — revois les chapitres en rouge.";
  document.getElementById("qzone").innerHTML="";
  document.getElementById("result").innerHTML=`
    <div class="result-pct">${pct}%</div>
    <div class="result-msg">${msg}</div>
    <div class="result-grid">
      <div class="rstat ok"><div class="rv">${ok}</div><div class="rl">Correctes</div></div>
      <div class="rstat ko"><div class="rv">${ko}</div><div class="rl">Incorrectes</div></div>
      <div class="rstat"><div class="rv">${pts}/100</div><div class="rl">Score</div></div>
    </div>
    <div class="breakdown"><h3>Résultats par thème</h3>${bHTML}</div>
    <button class="btn primary" onclick="restart()" style="width:100%">Recommencer</button>`;
  document.getElementById("result").style.display="block";
  document.getElementById("nav").style.display="none";
  document.querySelector(".progress-wrap").style.display="none";
}

function restart(){
  cur=0;ans=new Array(50).fill(-1);locked=new Array(50).fill(false);
  document.getElementById("result").style.display="none";
  document.getElementById("nav").style.display="flex";
  document.querySelector(".progress-wrap").style.display="block";
  document.getElementById("score").textContent="0";
  render();
}
render();
</script>
</body>
</html>
